<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiredLogics OneClick</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; color: #0f172a; background: #fff; width: 280px; }
    .wrap { padding: 16px; }
    .title { font-weight: 800; color: #0f172a; font-size: 16px; margin-bottom: 12px; }
    .btn { width: 100%; border: 0; border-radius: 10px; padding: 12px; font-weight: 700; cursor: pointer; font-size: 14px; margin-bottom: 8px; }
    .btn-primary { background: #10b981; color: #fff; }
    .btn-primary:hover { background: #0d9668; }
    .btn-secondary { background: #f1f5f9; color: #0f172a; }
    .btn-secondary:hover { background: #e2e8f0; }
    small { color: #64748b; font-size: 12px; display: block; margin-top: 12px; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">HiredLogics OneClick</div>
    <button id="open" class="btn btn-primary">Open on this page</button>
    <button id="options" class="btn btn-secondary">Settings (API URL & Key)</button>
    <small>Configure API URL and API key in Settings. Get the key from the BD dashboard.</small>
  </div>
  <script src="popup.js"></script>
</body>
</html>
